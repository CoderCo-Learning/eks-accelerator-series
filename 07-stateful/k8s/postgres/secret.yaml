# A plain Kubernetes Secret for the Postgres password. This is a stopgap.
# base64 is encoding, not encryption. EP8 moves this to AWS Secrets Manager
# through External Secrets. Do not commit a real password here.
apiVersion: v1
kind: Secret
metadata:
  name: postgres
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_DB: app
  POSTGRES_PASSWORD: change-me-in-ep8
